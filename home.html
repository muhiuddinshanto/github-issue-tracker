<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>



    <!-- daisy+tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- GoogleFont -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- Fontawosome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">
    <header>
        <div class=" bg-base-100 shadow-sm ">
            <div class="w-11/12 mx-auto navbar justify-between">
                <div class="flex items-center justify-between gap-3 ">
                    <div class="img w-[36px]">
                        <img src="assets/github-logo.png" alt="">
                    </div>
                    <div class="text">
                        <h2>GitHub Issues Tracker</h2>
                    </div>
                </div>
                <div class="join">
                    <div>
                        <label class="input validator join-item">
                            <i class="fa-brands fa-sistrix"></i> <input id="input-search" type="text" placeholder='Search issues...'
                                required />
                        </label>
                       
                    </div>
                    <button id="btn-search" class="btn btn-neutral join-item">New Issue</button>
                </div>
            </div>
        </div>
    </header>

    <section class="pt-14 w-11/12 mx-auto">
        <div class="navbar bg-[#0000008] shadow-sm rounded-lg flex gap-2 p-5">
            <a id="btn-all" class="btn btn-primary text-xl">All</a>
            <a id="btn-open" class="btn  text-xl">Open</a>
            <a id="btn-closed" class="btn  text-xl">Closed</a>
        </div>
    </section>


     

    <main class="mt-4 w-11/12 mx-auto ">
        <div>
            <div class=" navbar shadow-sm rounded-tr-lg rounded-tl-lg flex gap-2 p-6 justify-between">

                <div class="left flex items-center gap-2">
                    <div class=" bg-[#ECE4FF] rounded-full p-2">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h3 id="issue-count" class="font-semibold text-xl">50 Issues</h3>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="rigth flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <img src="./assets/green.png" alt="">
                        <p>Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <img src="./assets/parpel.png" alt="">
                        <p>Closed</p>
                    </div>
                </div>
            </div>
        </div>



        <div id="all-issue-section" class="bg-[#fffafa] pb-8">
            <div id="card-section" class="card-section grid grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 gap-3 p-6 ">



            </div>

        </div>

   


    </main>

    
        <!-- Open the modal using ID.showModal() method -->
        
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div  class="modal-box">
                <div id="modal-add"></div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    
    <script src="script/java.js"></script>
</body>

</html>
